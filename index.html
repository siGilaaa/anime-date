<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Syazliana 🌸</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Hi Syazliana 🌸</h1>

        <p>Awak nak keluar dengan saya tak?</p>

        <button id="yesBtn">Ya ❤️</button>
        <button id="noBtn">Tak 😢</button>

        <div id="dateSection" class="hidden">
            <h3>Pilih tarikh & masa</h3>

            <input type="date" id="date">
            <input type="time" id="time">

            <button id="confirmBtn">Confirm 💖</button>
        </div>

        <p id="result"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
